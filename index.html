<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f5f7fa;padding:8px}
.bar{background:#fff;border-radius:10px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border:1px solid #ddd}
.ti{font-weight:bold;flex:1;color:#1a3a5c;font-size:14px}
.dl{font-size:12px;font-weight:bold;color:#1a3a5c;min-width:130px;text-align:center}
.btn{border:1px solid #bbb;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;background:#fff}
.btn.ac{background:#1a5fa8;color:#fff;border-color:#1a5fa8}
.btn.red{color:#a32d2d}
.sy{font-size:11px;color:#888;margin-bottom:6px}
.gw{overflow-x:auto;border:1px solid #ddd;border-radius:10px;background:#fff}
.gi{min-width:600px}
.gh{display:flex;background:#f0f4f8;border-bottom:1px solid #ddd;border-radius:10px 10px 0 0}
.sc{width:95px;min-width:95px;padding:5px 6px;font-size:10px;color:#888;border-right:1px solid #ddd}
.th{flex:1;display:flex}
.tc{flex:1;text-align:center;padding:4px 0;font-size:9px;color:#666;border-left:1px solid #e8f0f8;min-width:0}
.tc.hf{color:#bbb}
.sr{display:flex;border-bottom:1px solid #eee}
.sr:last-child{border-bottom:none}
.si{width:95px;min-width:95px;padding:4px 6px;border-right:1px solid #ddd;background:#f7fafd}
.sn{font-size:11px;font-weight:bold;color:#1a3a5c}
.sm{font-size:9px;color:#888}
.sa{flex:1;display:flex;position:relative;min-height:40px}
.sl{flex:1;border-left:1px solid #eee;cursor:pointer;position:relative;min-width:0}
.sl.hf{border-left:1px dashed #f0f4f8}
.sl:hover{background:#eef6ff}
.bk{position:absolute;inset:2px;border-radius:4px;padding:1px 3px;font-size:9px;cursor:pointer;overflow:hidden}
.bk.rest{background:#e8edf2!important;color:#999!important;font-style:italic}
.nl{position:absolute;top:0;bottom:0;width:2px;background:#e84040;z-index:9;pointer-events:none}
.nd{position:absolute;top:-3px;left:-3px;width:8px;height:8px;border-radius:50%;background:#e84040}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex}
.box{background:#fff;border-radius:12px;padding:16px;width:320px;max-width:100%;max-height:85vh;overflow-y:auto}

.f{margin-bottom:8px}
.f label{display:block;font-size:11px;color:#888;margin-bottom:2px}
.f input,.f select{width:100%;border:1px solid #ccc;border-radius:6px;padding:5px 8px;font-size:12px}
.row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #eee}
.row:last-child{border-bottom:none}
.cdot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.br{display:flex;gap:6px;justify-content:flex-end;margin-top:12px}
.copts{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.copt{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.copt.sel{border-color:#1a2a3a}

<body>
<div class="bar">
  <div class="ti">芒聹聜 茫聝卢茫聝聝茫聜鹿茫聝鲁盲潞聢莽麓聞猫隆篓</div>
  <button class="btn" onclick="cd(-1)">芒聴聞</button>

</div>
<div class="sy" id="sy">猫陋颅茫聛驴猫戮录茫聛驴盲赂颅...</div>
<div class="gw"><div class="gi" id="gr"></div></div>
<div class="ov" id="ov" onclick="if(event.target===this)hd()"><div class="box" id="bx"></div></div>

<script>
var GAS_URL = "https://script.google.com/macros/s/AKfycbyYKdJsrH43QlIIujIIEf-8xLZJtkWgZTYwcjz-pvQHcg5n50hVy8iKdVi66mcvL9cS/exec";
var WK = ["忙聴楼","忙聹聢","莽聛芦","忙掳麓","忙聹篓","茅聡聭","氓聹聼"];
var COLS  = ["#CECBF6","#9FE1CB","#F5C4B3","#F4C0D1","#FAC775","#B5D4F4","#C0DD97","#F7C1C1"];
var TCOLS = ["#3C3489","#085041","#712B13","#72243E","#633806","#0C447C","#27500A","#791F1F"];
var D = {
  bks: {},
  staff: [
    {id:"s1",n:"茫聜鹿茫聜驴茫聝聝茫聝聲A",r:"茫聜鹿茫聜驴茫聜陇茫聝陋茫聜鹿茫聝聢",o:false},
    {id:"s2",n:"茫聜鹿茫聜驴茫聝聝茫聝聲B",r:"茫聜鹿茫聜驴茫聜陇茫聝陋茫聜鹿茫聝聢",o:false},
    {id:"s3",n:"茫聜鹿茫聜驴茫聝聝茫聝聲C",r:"茫聜垄茫聜路茫聜鹿茫聜驴茫聝鲁茫聝聢",o:false}
  ],
  menus: [
    {n:"茫聜芦茫聝聝茫聝聢",c:0,t:30},
    {n:"茫聜芦茫聝漏茫聝录",c:1,t:60},
    {n:"茫聝聭茫聝录茫聝聻",c:2,t:90},
    {n:"茫聝聢茫聝陋茫聝录茫聝聢",c:3,t:30},
    {n:"茫聜路茫聝拢茫聝鲁茫聝聴茫聝录",c:4,t:30}
  ],
  ts: 9, te: 19
};
var cur = new Date();
var stab = "staff";

function DK(d){ return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function FD(d){ return d.getFullYear()+"氓鹿麓"+(d.getMonth()+1)+"忙聹聢"+d.getDate()+"忙聴楼茂录聢"+WK[d.getDay()]+"茂录聣"; }
function HL(v){ return Math.floor(v)+":"+(v%1?"30":"00"); }
function SL(){ var a=[]; for(var h=D.ts;h<D.te;h++){a.push(h);a.push(h+0.5);} return a; }
function MC(n){ var m=D.menus.find(function(x){return x.n===n;}); return m?{b:COLS[m.c],t:TCOLS[m.c]}:{b:COLS[0],t:TCOLS[0]}; }
function MT(n){ var m=D.menus.find(function(x){return x.n===n;}); return m?m.t:30; }
function el(id){ return document.getElementById(id); }
function mk(tag,attrs,text){
  var e = document.createElement(tag);
  Object.keys(attrs||{}).forEach(function(k){ e.setAttribute(k,attrs[k]); });
  if(text!=null) e.textContent = text;
  return e;
}
function hd(){ el("ov").className="ov"; }
function cd(n){ cur=new Date(cur); cur.setDate(cur.getDate()+n); render(); }
function gt(){ cur=new Date(); render(); }

function NP(){
  var now=new Date();
  if(now.toDateString()!==cur.toDateString()) return null;
  var tot=(D.te-D.ts)*60, e=(now.getHours()-D.ts)*60+now.getMinutes();
  if(e<0||e>tot) return null;
  return (e/tot)*100;
}

function load(){
  fetch(GAS_URL+"?action=load")
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.bks) D.bks=d.bks;
      if(d.staff&&d.staff.length) D.staff=d.staff;
      if(d.menus&&d.menus.length) D.menus=d.menus;
      if(d.ts!=null) D.ts=d.ts;
      if(d.te!=null) D.te=d.te;
      el("sy").textContent="氓聬聦忙聹聼忙赂聢茫聛驴"; render();
    })
    .catch(function(){ el("sy").textContent="茫聜陋茫聝聲茫聝漏茫聜陇茫聝鲁"; render(); });
}
function save(){
  el("sy").textContent="盲驴聺氓颅聵盲赂颅...";
  fetch(GAS_URL+"?action=save&data="+encodeURIComponent(JSON.stringify(D)))
    .then(function(){ el("sy").textContent="盲驴聺氓颅聵氓庐聦盲潞聠 "+new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}); })
    .catch(function(){ el("sy").textContent="盲驴聺氓颅聵茫聜篓茫聝漏茫聝录"; });
}

function render(){
  el("dl").textContent = FD(cur);
  var sl=SL(), dk=DK(cur), db=D.bks[dk]||{}, np=NP();
  var grid = el("gr");
  grid.innerHTML = "";

  var gh = mk("div",{class:"gh"});
  gh.appendChild(mk("div",{class:"sc"},"茫聜鹿茫聜驴茫聝聝茫聝聲"));
  var th = mk("div",{class:"th"});
  sl.forEach(function(v){
    th.appendChild(mk("div",{class:"tc"+(v%1?" hf":"")},HL(v)));
  });
  gh.appendChild(th);
  grid.appendChild(gh);

  D.staff.forEach(function(s){
    var sr = mk("div",{class:"sr"});
    var si = mk("div",{class:"si"});
    si.appendChild(mk("div",{class:"sn"},s.n));
    si.appendChild(mk("div",{class:"sm"},s.r+(s.o?" 脗路 盲录聭":"")));
    sr.appendChild(si);

    var sa = mk("div",{class:"sa"});
    if(s.o){
      var off = mk("div",{},"盲录聭忙聴楼");
      off.style.cssText="position:absolute;inset:0;background:#e8edf2;display:flex;align-items:center;padding-left:8px;font-size:11px;color:#999";
      sa.appendChild(off);
    }

    sl.forEach(function(v){
      var k = s.id+"_"+v;
      var bk = db[k];
      var slDiv = mk("div",{class:"sl"+(v%1?" hf":"")});
      if(bk){
        var isRest = (bk.m === "__rest__");
        var c = isRest ? {b:"#e8edf2",t:"#999"} : MC(bk.m);
        var label = isRest ? "盲录聭忙聠漏" : (v%1?"":( (bk.n||"").substring(0,4) ));
        var bkDiv = mk("div",{class:"bk"+(isRest?" rest":"")},label);
        bkDiv.style.background = c.b;
        bkDiv.style.color = c.t;
        (function(dk2,k2){
          bkDiv.addEventListener("click", function(){ showDet(dk2,k2); });
        })(dk,k);
        slDiv.appendChild(bkDiv);
      } else if(s.o){
        slDiv.style.background="#e8edf2";
      } else {
        (function(sid2,v2){
          slDiv.addEventListener("click", function(){ showAdd(sid2,v2); });
        })(s.id,v);
      }
      sa.appendChild(slDiv);
    });

    if(np!==null){
      var nl = mk("div",{class:"nl"});
      nl.style.left=np+"%";
      nl.appendChild(mk("div",{class:"nd"}));
      sa.appendChild(nl);
    }
    sr.appendChild(sa);
    grid.appendChild(sr);
  });
}

function showDet(dk,k){
  var db=D.bks[dk]||{}, bk=db[k]; if(!bk) return;
  var isRest = (bk.m === "__rest__");
  var s=D.staff.find(function(x){return k.startsWith(x.id);});
  var parts=k.split("_"), v=parseFloat(parts[parts.length-1]);
  var box = el("bx");
  box.innerHTML="";
  box.appendChild(mk("div",{class:"bh"},isRest?"盲录聭忙聠漏猫漏鲁莽麓掳":"盲潞聢莽麓聞猫漏鲁莽麓掳"));
  function row(label,val){
    var f=mk("div",{class:"f"});
    f.appendChild(mk("label",{},label));
    var d=mk("div",{},val);
    if(label==="茫聛聤氓庐垄莽聵聸氓聬聧") d.style.cssText="font-size:13px;font-weight:bold";
    f.appendChild(d);
    box.appendChild(f);
  }
  if(isRest){
    row("莽篓庐氓聢楼","盲录聭忙聠漏"); row("茫聜鹿茫聜驴茫聝聝茫聝聲",s?s.n:""); row("忙聶聜茅聳聯",HL(v)+"茫聙聹");
  } else {
    row("茫聛聤氓庐垄忙搂聵氓聬聧",bk.n); row("茫聝隆茫聝聥茫聝楼茫聝录",bk.m); row("忙聣聙猫娄聛忙聶聜茅聳聯",MT(bk.m)+"氓聢聠"); row("茫聜鹿茫聜驴茫聝聝茫聝聲",s?s.n:""); row("忙聶聜茅聳聯",HL(v)+"茫聙聹");
    if(bk.memo) row("茫聝隆茫聝垄",bk.memo);
  }
  var br = mk("div",{class:"br"});
  var delBtn = mk("button",{class:"btn red"},"氓聣聤茅聶聰");
  delBtn.addEventListener("click", function(){
    if(!confirm("氓聣聤茅聶聰茫聛聴茫聛戮茫聛聶茫聛聥茂录聼")) return;
    if(D.bks[dk]) delete D.bks[dk][k];
    hd(); render(); save();
  });
  br.appendChild(delBtn);
  var closeBtn = mk("button",{class:"btn"},"茅聳聣茫聛聵茫聜聥");
  closeBtn.addEventListener("click", hd);
  br.appendChild(closeBtn);
  box.appendChild(br);
  el("ov").className="ov on";
}

function showAdd(sid,v){
  var sl=SL();
  var box=el("bx");
  box.innerHTML="";
  box.appendChild(mk("div",{class:"bh"},"猫驴陆氓聤聽"));
  var mTabs = mk("div",{class:"tabs"});
  var tabY = mk("div",{class:"tab on"},"盲潞聢莽麓聞");

  mTabs.appendChild(tabY); mTabs.appendChild(tabK); box.appendChild(mTabs);
  var fArea = mk("div",{}); box.appendChild(fArea);
  function build(mode){
    fArea.innerHTML="";
    function ff(lab,ch){ var x=mk("div",{class:"f"}); x.appendChild(mk("label",{},lab)); x.appendChild(ch); fArea.appendChild(x); }
    if(mode=="y"){
      var fn=mk("input",{id:"fn",placeholder:"茫聛聤氓聬聧猫聲卤"}); ff("茫聛聤氓庐垄莽聵聸氓聬聧",fn);
      var fm=mk("select",{id:"fm"});
      D.menus.forEach(function(m){ fm.appendChild(mk("option",{value:m.n},m.n+"("+m.t+"氓聢聠)")); });
      ff("茫聝隆茫聝聥茫聝楼茫聝录",fm);
    }
    var fs=mk("select",{id:"fs"});
    D.staff.filter(function(s){return !s.o;}).forEach(function(s){ var o=mk("option",{value:s.id},s.n); if(s.id===sid) o.selected=true; fs.appendChild(o); });
    ff("茫聜鹿茫聜驴茫聝聝茫聝聲",fs);
    var fv=mk("select",{id:"fv"});
    sl.forEach(function(t){ var o=mk("option",{value:String(t)},HL(t)); if(t===v) o.selected=true; fv.appendChild(o); });
    ff("忙聶聜茅聳聯",fv);
    var fd=mk("input",{id:"fd",type:"date",value:DK(cur)}); ff("忙聴楼盲禄聵",fd);
    if(mode=="y"){ var fmm=mk("input",{id:"fmm",placeholder:"盲禄路氓聢聠"}); ff("茫聝隆茫聝垄",fmm); }
    var br=mk("div",{class:"br"});
    var cb=mk("button",{class:"btn"},"茫聜颅茫聝拢茫聝鲁茫聜鹿茫聜禄"); cb.addEventListener("click"hd); br.appendChild(cb);
    var ab=mk("button",{class:"btn ac"},mode=="y"?"盲潞聢莽麓聞猫驴陆氓聤聽" :"盲录聭忙聠漏芒每陆楼聤聽");
    ab.addEventListener("click",function(){
      var s2=el("fs").value; var v2=parseFloat(el("fv").value); var d2=el("fd").value;
      if(!s2){ alert("茫聜鹿茫聜驴茫聝聝茫聝聲茫聜聮茅聛赂忙聤聻茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞"); return; }
      if(!D.bks[d2]) D.bks[d2]={};
      var k=s2+"_"+v2;
      if(mode=="y"){
        var n=el("fn").value.trim(); var m=el("fm").value;
        var mm=el("fmm")?el("fmm").value.trim():"";
        if(!n||!m){ alert("茫聛聤氓聬聧氓聣聧茫聛篓茫聝隆茫聝聥茫聝楼茫聝录茫聜聮氓聟楼氓聤聸茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞"); return; }
        D.bks[d2][k]={n:n,m:m,memo:mm};
      } else { D.bks[d2][k]={n:"盲录聭忙聠漏",m:"__rest__",memo:""}; }
      hd(); render(); save();
    });
    br.appendChild(ab); fArea.appendChild(br);
  }
  build("y");
  tabY.addEventListener("click",function(){ tabY.className="tab on"; tabK.className="tab"; build("y"); });
  tabK.addEventListener("click",function(){ tabK.className="tab on"; tabY.className="tab"; build("k"); });
  el("ov").className="ov on";
}

  box.appendChild(mk("div",{class:"bh"},"猫篓颅氓庐聵"));
  var tabs=mk("div",{class:"tabs"});
  ["staff","menu","time"].forEach(function(t){
    var lab={staff:"茫聜鹿茫聜驴茫聝聝茫聝聲",menu:"茫聝隆茫聝聥茫聝楼茫聝录",time:"j職f娄ZL聣玫m脩t矛(聙聙聙聛脵聟脠聛脩聟聢玫碌卢聽聣聭楼脴聢卤铆聧卤聟脥脤猫聣脩聟聢聢卢隆脥脩聟聢么么玫脨眉聢聛陆赂聢猫聢聢楼么卤卤聟聢陇矛(聙聙聙聛脩聟聢鹿聟聭聭脵聲鹿脩1楼脥脩聲鹿聲脠聽聣聧卤楼聧卢聢卤聶脮鹿聧脩楼陆赂聽楼矛聛脥脩聟聢玫脨矛聛脥隆陆脻M聲脨聽陇矛聛么陇矛(聙聙聙聛脩聟聣脤鹿聟脕脕聲鹿聭
