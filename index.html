<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>レッスン予約表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f5f7fa;padding:8px}
.bar{background:#fff;border-radius:10px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border:1px solid #ddd}
.ti{font-weight:bold;flex:1;color:#1a3a5c;font-size:14px}
.dl{font-size:12px;font-weight:bold;color:#1a3a5c;min-width:130px;text-align:center}
.btn{border:1px solid #bbb;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;background:#fff}
.btn.ac{background:#1a5fa8;color:#fff;border-color:#1a5fa8}
.btn.red{color:#a32d2d}
.sy{font-size:11px;color:#888;margin-bottom:6px}
.gw{overflow-x:auto;border:1px solid #ddd;border-radius:10px;background:#fff}
.gi{min-width:600px}
.gh{display:flex;background:#f0f4f8;border-bottom:1px solid #ddd;border-radius:10px 10px 0 0}
.sc{width:95px;min-width:95px;padding:5px 6px;font-size:10px;color:#888;border-right:1px solid #ddd}
.th{flex:1;display:flex}
.tc{flex:1;text-align:center;padding:4px 0;font-size:9px;color:#666;border-left:1px solid #e8f0f8;min-width:0}
.tc.hf{color:#bbb}
.sr{display:flex;border-bottom:1px solid #eee}
.sr:last-child{border-bottom:none}
.si{width:95px;min-width:95px;padding:4px 6px;border-right:1px solid #ddd;background:#f7fafd}
.sn{font-size:11px;font-weight:bold;color:#1a3a5c}
.sm{font-size:9px;color:#888}
.sa{flex:1;display:flex;position:relative;min-height:40px}
.sl{flex:1;border-left:1px solid #eee;cursor:pointer;position:relative;min-width:0}
.sl.hf{border-left:1px dashed #f0f4f8}
.sl:hover{background:#eef6ff}
.bk{position:absolute;inset:2px;border-radius:4px;padding:1px 3px;font-size:9px;cursor:pointer;overflow:hidden}
.bk.rest{background:#e8edf2!important;color:#999!important;font-style:italic}
.nl{position:absolute;top:0;bottom:0;width:2px;background:#e84040;z-index:9;pointer-events:none}
.nd{position:absolute;top:-3px;left:-3px;width:8px;height:8px;border-radius:50%;background:#e84040}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex}
.box{background:#fff;border-radius:12px;padding:16px;width:320px;max-width:100%;max-height:85vh;overflow-y:auto}
.bh{font-weight:bold;margin-bottom:12px;font-size:14px;color:#1a3a5c}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:5px 10px;border:1px solid #bbb;border-radius:6px;font-size:11px;cursor:pointer;background:#fff}
.tab.on{background:#1a5fa8;color:#fff;border-color:#1a5fa8}
.f{margin-bottom:8px}
.f label{display:block;font-size:11px;color:#888;margin-bottom:2px}
.f input,.f select{width:100%;border:1px solid #ccc;border-radius:6px;padding:5px 8px;font-size:12px}
.row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #eee}
.row:last-child{border-bottom:none}
.cdot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.br{display:flex;gap:6px;justify-content:flex-end;margin-top:12px}
.copts{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.copt{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.copt.sel{border-color:#1a2a3a}
</style>
</head>
<body>
<div class="bar">
  <div class="ti">✂ レッスン予約表</div>
  <button class="btn" onclick="cd(-1)">◄</button>
  <div class="dl" id="dl"></div>
  <button class="btn" onclick="cd(1)">►</button>
  <button class="btn" onclick="gt()">今日</button>
  <button class="btn ac" onclick="showAdd(null,null)">＋予約</button>
  <button class="btn" onclick="showSet()">設定</button>
</div>
<div class="sy" id="sy">読み込み中...</div>
<div class="gw"><div class="gi" id="gr"></div></div>
<div class="ov" id="ov" onclick="if(event.target===this)hd()"><div class="box" id="bx"></div></div>


<script>
var GAS_URL = "https://script.google.com/macros/s/AKfycbyYKdJsrH43QlIIujIIEf-8xLZJtkWgZTYwcjz-pvQHcg5n50hVy8iKdVi66mcvL9cS/exec";
var WK = ["日","月","火","水","木","金","土"];
var COLS=["#CECBF6","#9FE1CB","#F5C4B3","#F4C0D1","#FAC775","#B5D4F4","#C0DD97","#F7C1C1"];
var TCOLS=["#3C3489","#085041","#712B13","#72243E","#633806","#0C447C","#27500A","#791F1F"];
var D={bks:{},staff:[{id:"s1",n:"スタッフA",r:"スタイリスト",o:false},{id:"s2",n:"スタッフB",r:"スタイリスト",o:false},{id:"s3",n:"スタッフC",r:"アシスタント",o:false}],menus:[{n:"カット",c:0,t:30},{n:"カラー",c:1,t:60},{n:"パーマ",c:2,t:90},{n:"トリート",c:3,t:30},{n:"シャンプー",c:4,t:30}],ts:9,te:19};
var cur=new Date();var stab="staff";
function DK(d){return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function FD(d){return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日（"+WK[d.getDay()]+"）";}
function HL(v){return Math.floor(v)+":"+(v%1?"30":"00");}
function SL(){var a=[];for(var h=D.ts;h<D.te;h++){a.push(h);a.push(h+0.5);}return a;}
function MC(n){var m=D.menus.find(function(x){return x.n===n;});return m?{b:COLS[m.c],t:TCOLS[m.c]}:{b:COLS[0],t:TCOLS[0]};}
function MT(n){var m=D.menus.find(function(x){return x.n===n;});return m?m.t:30;}
function el(id){return document.getElementById(id);}
function mk(tag,attrs,text){var e=document.createElement(tag);Object.keys(attrs||{}).forEach(function(k){e.setAttribute(k,attrs[k]);});if(text!=null)e.textContent=text;return e;}
function hd(){el("ov").className="ov";}
function cd(n){cur=new Date(cur);cur.setDate(cur.getDate()+n);render();}
function gt(){cur=new Date();render();}
function NP(){var now=new Date();if(now.toDateString()!==cur.toDateString())return null;var tot=(D.te-D.ts)*60,e=(now.getHours()-D.ts)*60+now.getMinutes();if(e<0||e>tot)return null;return(e/tot)*100;}
function load(){fetch(GAS_URL+"?action=load").then(function(r){return r.json();}).then(function(d){if(d.bks)D.bks=d.bks;if(d.staff&&d.staff.length)D.staff=d.staff;if(d.menus&&d.menus.length)D.menus=d.menus;if(d.ts!=null)D.ts=d.ts;if(d.te!=null)D.te=d.te;el("sy").textContent="同期済み";render();}).catch(function(){el("sy").textContent="オフライン";render();});}
function save(){el("sy").textContent="保存中...";fetch(GAS_URL+"?action=save&data="+encodeURIComponent(JSON.stringify(D))).then(function(){el("sy").textContent="保存完了 "+new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});}).catch(function(){el("sy").textContent="保存エラー";});}
function render(){el("dl").textContent=FD(cur);var sl=SL(),dk=DK(cur),db=D.bks[dk]||{},np=NP();var grid=el("gr");grid.innerHTML="";var gh=mk("div",{class:"gh"});gh.appendChild(mk("div",{class:"sc"},"スタッフ"));var th=mk("div",{class:"th"});sl.forEach(function(v){th.appendChild(mk("div",{class:"tc"+(v%1?" hf":"")},HL(v)));});gh.appendChild(th);grid.appendChild(gh);D.staff.forEach(function(s){var sr=mk("div",{class:"sr"});var si=mk("div",{class:"si"});si.appendChild(mk("div",{class:"sn"},s.n));si.appendChild(mk("div",{class:"sm"},s.r+(s.o?" · 休":"")));sr.appendChild(si);var sa=mk("div",{class:"sa"});if(s.o){var off=mk("div",{},"休日");off.style.cssText="position:absolute;inset:0;background:#e8edf2;display:flex;align-items:center;padding-left:8px;font-size:11px;color:#999";sa.appendChild(off);}sl.forEach(function(v){var k=s.id+"_"+v;var bk=db[k];var slDiv=mk("div",{class:"sl"+(v%1?" hf":"")});if(bk){var isRest=(bk.m==="__rest__");var c=isRest?{b:"#e8edf2",t:"#999"}:MC(bk.m);var label=isRest?"休憩":(v%1?"":((bk.n||"").substring(0,4)));var bkDiv=mk("div",{class:"bk"+(isRest?" rest":"")},label);bkDiv.style.background=c.b;bkDiv.style.color=c.t;(function(dk2,k2){bkDiv.addEventListener("click",function(){showDet(dk2,k2);});})(dk,k);slDiv.appendChild(bkDiv);}else if(s.o){slDiv.style.background="#e8edf2";}else{(function(sid2,v2){slDiv.addEventListener("click",function(){showAdd(sid2,v2);});})(s.id,v);}sa.appendChild(slDiv);});if(np!==null){var nl=mk("div",{class:"nl"});nl.style.left=np+"%";nl.appendChild(mk("div",{class:"nd"}));sa.appendChild(nl);}sr.appendChild(sa);grid.appendChild(sr);});}

function showDet(dk,k){var db=D.bks[dk]||{},bk=db[k];if(!bk)return;var isRest=(bk.m==="__rest__");var s=D.staff.find(function(x){return k.startsWith(x.id);});var parts=k.split("_"),v=parseFloat(parts[parts.length-1]);var box=el("bx");box.innerHTML="";box.appendChild(mk("div",{class:"bh"},isRest?"休憩詳細":"予約詳細"));function row(label,val){var f=mk("div",{class:"f"});f.appendChild(mk("label",{},label));var d=mk("div",{},val);if(label==="お客様名")d.style.cssText="font-size:13px;font-weight:bold";f.appendChild(d);box.appendChild(f);}if(isRest){row("種別","休憩");row("スタッフ",s?s.n:"");row("時間",HL(v)+"〜");}else{row("お客様名",bk.n);row("メニュー",bk.m);row("所要時間",MT(bk.m)+"分");row("スタッフ",s?s.n:"");row("時間",HL(v)+"〜");if(bk.memo)row("メモ",bk.memo);}var br=mk("div",{class:"br"});var delBtn=mk("button",{class:"btn red"},"削除");delBtn.addEventListener("click",function(){if(!confirm("削除しますか？"))return;if(D.bks[dk])delete D.bks[dk][k];hd();render();save();});br.appendChild(delBtn);var closeBtn=mk("button",{class:"btn"},"閉じる");closeBtn.addEventListener("click",hd);br.appendChild(closeBtn);box.appendChild(br);el("ov").className="ov on";}
function showAdd(sid,v){var sl=SL();var box=el("bx");box.innerHTML="";box.appendChild(mk("div",{class:"bh"},"追加"));var mTabs=mk("div",{class:"tabs"});var tabY=mk("div",{class:"tab on"},"予約");var tabK=mk("div",{class:"tab"},"休憩");mTabs.appendChild(tabY);mTabs.appendChild(tabK);box.appendChild(mTabs);var fArea=mk("div",{});box.appendChild(fArea);function build(mode){fArea.innerHTML="";function ff(lab,ch){var x=mk("div",{class:"f"});x.appendChild(mk("label",{},lab));x.appendChild(ch);fArea.appendChild(x);}if(mode==="y"){var fn=mk("input",{id:"fn",placeholder:"お名前"});ff("お客様名",fn);var fm=mk("select",{id:"fm"});D.menus.forEach(function(m){fm.appendChild(mk("option",{value:m.n},m.n+"（"+m.t+"分）"));});ff("メニュー",fm);}var fs=mk("select",{id:"fs"});D.staff.filter(function(s){return !s.o;}).forEach(function(s){var o=mk("option",{value:s.id},s.n);if(s.id===sid)o.selected=true;fs.appendChild(o);});ff("スタッフ",fs);var fv=mk("select",{id:"fv"});sl.forEach(function(t){var o=mk("option",{value:String(t)},HL(t));if(t===v)o.selected=true;fv.appendChild(o);});ff("時間",fv);var fd=mk("input",{id:"fd",type:"date",value:DK(cur)});ff("日付",fd);if(mode==="y"){var fmm=mk("input",{id:"fmm",placeholder:"任意"});ff("メモ",fmm);}var br=mk("div",{class:"br"});var cb=mk("button",{class:"btn"},"キャンセル");cb.addEventListener("click",hd);br.appendChild(cb);var ab=mk("button",{class:"btn ac"},mode==="y"?"予約追加":"休憩追加");ab.addEventListener("click",function(){var s2=el("fs").value;var v2=parseFloat(el("fv").value);var d2=el("fd").value;if(!s2){alert("スタッフを選択してください");return;}if(!D.bks[d2])D.bks[d2]={};var k=s2+"_"+v2;if(mode==="y"){var n=el("fn").value.trim();var m=el("fm").value;var mm=el("fmm")?el("fmm").value.trim():"";if(!n||!m){alert("お名前とメニューを入力してください");return;}D.bks[d2][k]={n:n,m:m,memo:mm};}else{D.bks[d2][k]={n:"休憩",m:"__rest__",memo:""};} hd();render();save();});br.appendChild(ab);fArea.appendChild(br);}build("y");tabY.addEventListener("click",function(){tabY.className="tab on";tabK.className="tab";build("y");});tabK.addEventListener("click",function(){tabK.className="tab on";tabY.className="tab";build("k");});el("ov").className="ov on";}
function showSet(){var box=el("bx");box.innerHTML="";box.appendChild(mk("div",{class:"bh"},"設定"));var tabs=mk("div",{class:"tabs"});["staff","menu","time"].forEach(function(t){var lab={staff:"スタッフ",menu:"メニュー",time:"時間"}[t];var tab=mk("div",{class:"tab"+(stab===t?" on":"")},lab);tab.addEventListener("click",function(){stab=t;showSet();});tabs.appendChild(tab);});box.appendChild(tabs);var cont=mk("div",{id:"stcont"});if(stab==="staff"){D.staff.forEach(function(s,i){var row=mk("div",{class:"row"});var dot=mk("div",{class:"cdot"});dot.style.background=COLS[i%COLS.length];row.appendChild(dot);var iN=mk("input",{value:s.n});iN.style.cssText="flex:1;border:1px solid #ccc;border-radius:4px;padding:3px 6px;font-size:12px";iN.addEventListener("change",function(){D.staff[i].n=this.value;});row.appendChild(iN);var iR=mk("input",{value:s.r});iR.style.cssText="flex:1;border:1px solid #ccc;border-radius:4px;padding:3px 6px;font-size:12px";iR.addEventListener("change",function(){D.staff[i].r=this.value;});row.appendChild(iR);var cb=mk("input",{type:"checkbox",title:"休日"});cb.checked=s.o;cb.addEventListener("change",function(){D.staff[i].o=this.checked;});row.appendChild(cb);var del=mk("button",{class:"btn red"},"✕");del.addEventListener("click",function(){D.staff.splice(i,1);showSet();});row.appendChild(del);cont.appendChild(row);});var addB=mk("button",{class:"btn"},"＋追加");addB.style.marginTop="8px";addB.addEventListener("click",function(){D.staff.push({id:"s"+Date.now(),n:"新スタッフ",r:"",o:false});showSet();});cont.appendChild(addB);}else if(stab==="menu"){D.menus.forEach(function(m,i){var row=mk("div",{class:"row"});var iN=mk("input",{value:m.n});iN.style.cssText="flex:2;border:1px solid #ccc;border-radius:4px;padding:3px 6px;font-size:12px";iN.addEventListener("change",function(){D.menus[i].n=this.value;});row.appendChild(iN);var sel=mk("select",{});sel.style.cssText="width:70px;border:1px solid #ccc;border-radius:4px;padding:3px 4px;font-size:11px";[15,30,45,60,90,120].forEach(function(min){var o=mk("option",{value:String(min)},min+"分");if((m.t||30)===min)o.selected=true;sel.appendChild(o);});sel.addEventListener("change",function(){D.menus[i].t=parseInt(this.value);});row.appendChild(sel);var copts=mk("div",{class:"copts"});COLS.forEach(function(c,ci){var opt=mk("div",{class:"copt"+(m.c===ci?" sel":"")});opt.style.background=c;opt.addEventListener("click",function(){D.menus[i].c=ci;showSet();});copts.appendChild(opt);});row.appendChild(copts);var del=mk("button",{class:"btn red"},"✕");del.addEventListener("click",function(){D.menus.splice(i,1);showSet();});row.appendChild(del);cont.appendChild(row);});var addB2=mk("button",{class:"btn"},"＋追加");addB2.style.marginTop="8px";addB2.addEventListener("click",function(){D.menus.push({n:"新メニュー",c:0,t:30});showSet();});cont.appendChild(addB2);}else{var f1=mk("div",{class:"f"});f1.appendChild(mk("label",{},"開始時間"));var sts=mk("select",{id:"sts"});for(var i=6;i<=12;i++){var o=mk("option",{value:String(i)},i+"時");if(D.ts===i)o.selected=true;sts.appendChild(o);}f1.appendChild(sts);cont.appendChild(f1);var f2=mk("div",{class:"f"});f2.appendChild(mk("label",{},"終了時間"));var ste=mk("select",{id:"ste"});for(var j=17;j<=23;j++){var o2=mk("option",{value:String(j)},j+"時");if(D.te===j)o2.selected=true;ste.appendChild(o2);}f2.appendChild(ste);cont.appendChild(f2);var apB=mk("button",{class:"btn ac"},"適用");apB.style.marginTop="8px";apB.addEventListener("click",function(){D.ts=parseInt(el("sts").value);D.te=parseInt(el("ste").value);render();});cont.appendChild(apB);}var svBr=mk("div",{class:"br"});var svBtn=mk("button",{class:"btn ac"},"保存して閉じる");svBtn.addEventListener("click",function(){hd();render();save();});svBr.appendChild(svBtn);cont.appendChild(svBr);box.appendChild(cont);el("ov").className="ov on";}
load();
</script>
</body>
</html>
